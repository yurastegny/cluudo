name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Cluudo
        run: |
          xcodebuild \
            -project Cluudo.xcodeproj \
            -scheme Cluudo \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/CluudoDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build
